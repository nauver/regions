<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="assets/styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/config.js"></script><title>Kiosk</title></head><body class="bg"><div class="logo"><img src="assets/logo_CoR-vertical-negative-en-quadri_LR.png" alt="European Committee of the Regions logo"></div><main class="page"><section class="page-card"><h1>Join the wall</h1><form id="kioskForm"><div class="grid"><div class="field"><label>First name</label><input name="firstName" required maxlength="40"></div><div class="field"><label>Last name</label><input name="lastName" required maxlength="40"></div><div class="field wide"><label>Region and country</label><select id="regionSelect" name="region" required><option value="">Choose a region</option></select></div><div class="field wide"><label>What makes your region unique?</label><textarea name="quote" required maxlength="160"></textarea></div></div><div class="camera-grid"><div><div class="camera-box"><video id="video" muted playsinline></video></div><div class="actions"><button type="button" class="btn" id="startCamera">Start camera</button><button type="button" class="btn primary" id="takePhoto">Take photo</button></div></div><div><div class="camera-box" id="previewBox"></div><p class="hint">If no photo is taken, a silhouette will be used.</p></div></div><div class="actions"><button class="btn primary">Submit</button></div></form></section></main><div class="toast" id="toast"></div><div class="config-warning" id="configWarning">Configure assets/config.js with your Supabase URL and anon key.</div><script src="assets/app.js"></script><script>initKiosk();</script></body></html>
